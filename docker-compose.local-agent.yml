services:
  local-agent:
    build:
      context: /local
      dockerfile: /local/docker/local-agent/Dockerfile
    container_name: freewiller-local-agent
    restart: unless-stopped
    network_mode: host
    environment:
      LOCAL_LLM_DIR: /local/state/freewiller
      FREEWILLER_LOG_DIR: /local/log/freewiller
      OLLAMA_API_URL: http://127.0.0.1:11434
      LOCAL_AGENT_HTTP_HOST: 127.0.0.1
      LOCAL_AGENT_HTTP_PORT: 18790
      OPENCLAW_MEMORY_QUEUE_ENABLED: "1"
      OPENCLAW_MEMORY_QUEUE_FILE: /local/bridge/openclaw/openclaw-memory-queue.jsonl
      OPENCLAW_MEMORY_QUEUE_OFFSET_FILE: /local/state/freewiller/bridge/openclaw-memory-queue.offset
      OPENCLAW_MEMORY_QUEUE_POLL_SECONDS: 5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18790/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /local/state/freewiller:/local/state/freewiller
      - /local/log/freewiller:/local/log/freewiller
      - /local/.openclaw/workspace/freewiller-ingest:/local/bridge/openclaw
